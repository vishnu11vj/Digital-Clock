<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Clock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #050510;
    background-image: radial-gradient(ellipse at center, #0a0a2a 0%, #050510 70%);
    font-family: 'Orbitron', monospace;
  }
  .clock-wrap { text-align: center; }
  .date { color: #4466aa; font-size: 14px; letter-spacing: 4px; margin-bottom: 32px; font-family: 'Exo 2'; font-weight: 300; }
  .time {
    font-size: clamp(60px, 12vw, 120px); font-weight: 900; letter-spacing: 8px;
    background: linear-gradient(180deg, #00ccff, #0066ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none; filter: drop-shadow(0 0 30px rgba(0,150,255,0.6));
    margin-bottom: 16px;
  }
  .seconds {
    font-size: clamp(24px, 5vw, 48px); font-weight: 400; letter-spacing: 4px;
    color: #0066ff; opacity: 0.7;
  }
  .ampm { font-size: 20px; color: #446688; margin-left: 12px; letter-spacing: 2px; }
  .divider { width: 200px; height: 1px; background: linear-gradient(90deg, transparent, #0066ff, transparent); margin: 32px auto; }
  .extras { display: flex; gap: 40px; justify-content: center; }
  .extra { text-align: center; }
  .extra-val { color: #00aaff; font-size: 18px; font-weight: 700; }
  .extra-label { color: #334466; font-size: 10px; letter-spacing: 2px; margin-top: 4px; font-family: 'Exo 2'; }
  .scanline {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="clock-wrap">
  <div class="date" id="date"></div>
  <div class="time" id="time"></div>
  <div class="seconds"><span id="secs"></span><span class="ampm" id="ampm"></span></div>
  <div class="divider"></div>
  <div class="extras">
    <div class="extra"><div class="extra-val" id="tz"></div><div class="extra-label">Timezone</div></div>
    <div class="extra"><div class="extra-val" id="week"></div><div class="extra-label">Week</div></div>
    <div class="extra"><div class="extra-val" id="day"></div><div class="extra-label">Day of Year</div></div>
  </div>
</div>
<script>
  function pad(n){return String(n).padStart(2,'0');}
  function tick(){
    const now=new Date();
    const h=now.getHours(); const m=now.getMinutes(); const s=now.getSeconds();
    const ampm=h>=12?'PM':'AM'; const h12=h%12||12;
    document.getElementById('time').textContent=`${pad(h12)}:${pad(m)}`;
    document.getElementById('secs').textContent=pad(s);
    document.getElementById('ampm').textContent=ampm;
    document.getElementById('date').textContent=now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone.split('/').pop().replace('_',' ');
    document.getElementById('tz').textContent=tz;
    const start=new Date(now.getFullYear(),0,0);
    const diff=now-start; const oneDay=1000*60*60*24;
    document.getElementById('day').textContent=Math.floor(diff/oneDay);
    const oneWeek=oneDay*7; const week=Math.ceil((((now-new Date(now.getFullYear(),0,1))/86400000)+new Date(now.getFullYear(),0,1).getDay()+1)/7);
    document.getElementById('week').textContent=`W${pad(week)}`;
  }
  tick(); setInterval(tick,1000);
</script>
</body>
</html>
